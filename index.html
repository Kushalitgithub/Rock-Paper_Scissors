<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors — Kushal Bhattarai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="https://kushalbhattarai2.com.np" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Portfolio
        </a>
        <div class="header-title">Rock Paper Scissors</div>
        <button class="reset-btn" onclick="resetGame()">Reset</button>
    </header>

    <!-- MAIN -->
    <main>

        <!-- SCORE -->
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">You</span>
                <span class="score-num" id="userScore">0</span>
            </div>
            <div class="score-divider">
                <span class="score-vs">VS</span>
                <span class="round-counter" id="roundCounter">Round 1</span>
            </div>
            <div class="score-item">
                <span class="score-label">CPU</span>
                <span class="score-num" id="compScore">0</span>
            </div>
        </div>

        <!-- BATTLE ARENA -->
        <div class="arena" id="arena">
            <div class="arena-side" id="playerSide">
                <span class="arena-label">Your choice</span>
                <div class="arena-icon" id="playerIcon">?</div>
            </div>
            <div class="arena-center">
                <div class="vs-badge">VS</div>
            </div>
            <div class="arena-side" id="cpuSide">
                <span class="arena-label">CPU choice</span>
                <div class="arena-icon" id="cpuIcon">?</div>
            </div>
        </div>

        <!-- RESULT MESSAGE -->
        <div class="result-wrap" id="resultWrap">
            <div class="result-msg" id="resultMsg"></div>
        </div>

        <!-- CHOICES -->
        <div class="choices-section">
            <p class="choose-label">Choose your weapon</p>
            <div class="choices">
                <button class="choice-btn" id="rockBtn" onclick="play('rock')" title="Rock">
                    <div class="choice-emoji">🪨</div>
                    <span class="choice-name">Rock</span>
                </button>
                <button class="choice-btn" id="paperBtn" onclick="play('paper')" title="Paper">
                    <div class="choice-emoji">📄</div>
                    <span class="choice-name">Paper</span>
                </button>
                <button class="choice-btn" id="scissorsBtn" onclick="play('scissors')" title="Scissors">
                    <div class="choice-emoji">✂️</div>
                    <span class="choice-name">Scissors</span>
                </button>
            </div>
        </div>

    </main>

    <!-- RESULT OVERLAY -->
    <div class="overlay" id="overlay">
        <div class="overlay-card" id="overlayCard">
            <div class="overlay-icon" id="overlayIcon"></div>
            <div class="overlay-result" id="overlayResult"></div>
            <div class="overlay-detail" id="overlayDetail"></div>
            <div class="overlay-score" id="overlayScore"></div>
            <button class="overlay-btn" onclick="closeOverlay()">Play Again →</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Made by <a href="https://kushalbhattarai2.com.np">Kushal Bhattarai</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
